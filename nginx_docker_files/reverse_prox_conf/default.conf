server {
    # Listen on port 80.
    listen 80;
    # Redirect HTTP traffic to HTTPS.
    return 301 https://$host$request_uri;
}
#-------------- Main domain (rodgpe.com) -------------
server {
    listen      443 ssl;
    server_name  rodgpe.com;
    ssl_certificate     /usr/share/nginx/cert/domain_certificate.crt; 
    ssl_certificate_key /usr/share/nginx/cert/domain_private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    access_log  /var/log/nginx/host.access.log  main;
    location / {
        root   /usr/share/nginx/html/main;
        index  index.html index.htm;
    }
    error_page  404              /404.html;
    # redirect server error pages to the static page /50x.html
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
#---------------- Obsidian (publish.obsidian.md) -----------------
# Deferred DNS (resolver + variable host): nginx starts even if this hostname is slow to resolve;
# same pattern as Docker backends (Docker DNS at 127.0.0.11 forwards external names too).
server{
    listen              443 ssl;
	server_name obsidian.rodgpe.com;
    client_max_body_size 50M;
    ssl_certificate     /usr/share/nginx/cert/subdomain_certificate.crt; 
    ssl_certificate_key /usr/share/nginx/cert/subdomain_private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    location / {
        resolver          127.0.0.11 valid=10s ipv6=off;
        set               $obsidian_upstream_host publish.obsidian.md;
        proxy_ssl_server_name on;
        proxy_pass        https://$obsidian_upstream_host/serve?url=obsidian.rodgpe.com;
	}
}
#------------------- Notes subdomain (static files) -------------------
server{
    listen              443 ssl;
    server_name notes.rodgpe.com;
    client_max_body_size 50M;
    ssl_certificate     /usr/share/nginx/cert/subdomain_certificate.crt; 
    ssl_certificate_key /usr/share/nginx/cert/subdomain_private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
	root /usr/share/nginx/html/notes; 
	index index.html;
}
#------------------- Vikunja (Docker backend, deferred DNS) -------------------
#
# --- Why not use only:  proxy_pass http://vikunja:3456;
# Nginx resolves the upstream hostname at STARTUP. If the container does not exist yet or is
# stopped, Docker DNS has no "vikunja" record → "host not found in upstream" and nginx
# refuses to start. That takes down the ENTIRE reverse proxy even if other apps are fine.
#
# --- Docker + nginx pattern (resolve on each request)
# 1) resolver 127.0.0.11  → Docker embedded DNS inside the container (this IP is standard).
# 2) valid=10s            → cache backend IP for 10s (less DNS load; after a container starts,
#                           it may take up to ~10s to be picked up without reloading nginx).
# 3) ipv6=off             → avoid AAAA answers that sometimes break when the backend is IPv4-only.
# 4) set $vikunja_upstream vikunja  → name MUST match the Compose service: name in docker-compose.yml;
#                           both containers must share the same user-defined network (e.g. proxy_net).
# 5) proxy_pass http://$vikunja_upstream:3456$request_uri  → with a variable URL, nginx uses the
#                           resolver above at request time, not when loading the config.
#                           $request_uri keeps path and query string (required with variable proxy_pass).
#
# If the backend is down: this server_name returns 502; other server { } blocks keep working.
#
server {
    listen              443 ssl;
    server_name         vikunja.rodgpe.com;
    client_max_body_size 50M;
    ssl_certificate     /usr/share/nginx/cert/subdomain_certificate.crt;
    ssl_certificate_key /usr/share/nginx/cert/subdomain_private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    location / {
        # Read the comment block above before copying this pattern to another app.
        resolver          127.0.0.11 valid=10s ipv6=off;
        set               $vikunja_upstream vikunja;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass        http://$vikunja_upstream:3456$request_uri;
    }
}
