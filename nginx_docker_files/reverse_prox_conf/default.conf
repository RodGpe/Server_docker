#------------------- n8n configuration -------------------
server{
    listen              443 ssl;
    server_name         n8n.rodgpe.com;
    ssl_certificate     /usr/share/nginx/cert/subdomain_certificate.crt; 
    ssl_certificate_key /usr/share/nginx/cert/subdomain_private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 50M;
    location / {
        resolver          127.0.0.11 valid=10s ipv6=off;
        set               $n8n_upstream n8n;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass        http://$n8n_upstream:5678$request_uri;
        # $n8n must match the Compose service name (same Docker network as nginx)
    }
}

